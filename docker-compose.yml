services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      retries: 5

  gateway:
    build: ./slow-sql-gateway
    ports:
      - "${GATEWAY_PORT}:8080"
    environment:
      MYSQL_URL: jdbc:mysql://mysql:3306/slow_sql_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      AGENT_URL: http://agent:8000
      INSTANCE_HOST: mysql
      INSTANCE_PASSWORD: ${MYSQL_PASSWORD}
      SLOW_LOG_FILE_PATH: /app/test-slow.log
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  agent:
    build: ./slow-sql-agent
    ports:
      - "${AGENT_PORT}:8000"
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL}
      JAVA_GATEWAY_BASE_URL: http://gateway:8080/api/data
      JAVA_GATEWAY_TOKEN: ${INTERNAL_TOKEN}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/2?protocol=2
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672/
    depends_on:
      - gateway

  frontend:
    build: ./slow-sql-web
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - gateway
      - agent

volumes:
  mysql-data:
  redis-data:
